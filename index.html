<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weighted Grade Calculator</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const WeightedGradeCalculator = () => {
      const [students, setStudents] = useState([]);
      const [weights, setWeights] = useState({
        testsQuizzes: 75,
        homework: 10,
        classworkProjects: 10,
        primarySources: 5
      });
      const [categorizedAssignments, setCategorizedAssignments] = useState({});
      const [pendingAssignments, setPendingAssignments] = useState([]);
      const [showCategorization, setShowCategorization] = useState(false);
      const [selectedStudent, setSelectedStudent] = useState(null);
      const [classes, setClasses] = useState([]);
      const [currentClass, setCurrentClass] = useState(null);
      const [showAddClass, setShowAddClass] = useState(false);
      const [newClassName, setNewClassName] = useState('');

      useEffect(() => {
        const savedClasses = localStorage.getItem('gradeCalculatorClasses');
        if (savedClasses) {
          const parsedClasses = JSON.parse(savedClasses);
          setClasses(parsedClasses);
          if (parsedClasses.length > 0) {
            setCurrentClass(parsedClasses[0].id);
          }
        }
      }, []);

      useEffect(() => {
        if (currentClass) {
          const classData = localStorage.getItem(`gradeCalculatorData_${currentClass}`);
          if (classData) {
            const parsed = JSON.parse(classData);
            setCategorizedAssignments(parsed.categorizedAssignments || {});
            setWeights(parsed.weights || {
              testsQuizzes: 75,
              homework: 10,
              classworkProjects: 10,
              primarySources: 5
            });
          } else {
            setCategorizedAssignments({});
            setWeights({
              testsQuizzes: 75,
              homework: 10,
              classworkProjects: 10,
              primarySources: 5
            });
          }
          setStudents([]);
        }
      }, [currentClass]);

      useEffect(() => {
        if (currentClass && Object.keys(categorizedAssignments).length > 0) {
          const dataToSave = {
            categorizedAssignments,
            weights
          };
          localStorage.setItem(`gradeCalculatorData_${currentClass}`, JSON.stringify(dataToSave));
        }
      }, [categorizedAssignments, weights, currentClass]);

      const addNewClass = () => {
        if (!newClassName.trim()) return;
        
        const newClass = {
          id: Date.now().toString(),
          name: newClassName.trim()
        };
        
        const updatedClasses = [...classes, newClass];
        setClasses(updatedClasses);
        localStorage.setItem('gradeCalculatorClasses', JSON.stringify(updatedClasses));
        setCurrentClass(newClass.id);
        setNewClassName('');
        setShowAddClass(false);
      };

      const deleteClass = (classId) => {
        if (!confirm('Are you sure you want to delete this class?')) {
          return;
        }
        
        const updatedClasses = classes.filter(c => c.id !== classId);
        setClasses(updatedClasses);
        localStorage.setItem('gradeCalculatorClasses', JSON.stringify(updatedClasses));
        localStorage.removeItem(`gradeCalculatorData_${classId}`);
        
        if (currentClass === classId) {
          setCurrentClass(updatedClasses.length > 0 ? updatedClasses[0].id : null);
        }
      };

      const getCurrentClassName = () => {
        const classObj = classes.find(c => c.id === currentClass);
        return classObj ? classObj.name : '';
      };

      const parseCSVLine = (line) => {
        const result = [];
        let current = '';
        let inQuotes = false;
        
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          const nextChar = line[i + 1];
          
          if (char === '"') {
            if (inQuotes && nextChar === '"') {
              current += '"';
              i++;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (char === ',' && !inQuotes) {
            result.push(current.trim());
            current = '';
          } else {
            current += char;
          }
        }
        
        result.push(current.trim());
        return result;
      };

      const categorizeAssignment = (assignmentName) => {
        const name = assignmentName.toLowerCase();
        
        if (name.startsWith('ps ') || name.startsWith('ps:') || name.startsWith('ps-')) {
          return 'primarySources';
        }
        
        if (name.includes('ps ') || name.includes(' ps') || name.includes('dbq') || 
            name.includes('primary source') || name.includes('primary-source')) {
          return 'primarySources';
        } else if (name.includes('test') || name.includes('exam') || name.includes('quiz')) {
          return 'testsQuizzes';
        } else if (name.includes('homework') || name.includes('hw') || 
                   name.includes('book notes') || name.includes('book note')) {
          return 'homework';
        } else if (name.includes('classwork') || name.includes('project') ||
                   name.includes('video notes') || name.includes('video note')) {
          return 'classworkProjects';
        }
        return 'uncategorized';
      };

      const handleFileUpload = (event) => {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => {
            const text = e.target.result;
            parseCSV(text);
          };
          reader.readAsText(file);
        }
      };

      const parseCSV = (text) => {
        const lines = text.split('\n').filter(line => line.trim());
        if (lines.length < 6) return;

        const headers = parseCSVLine(lines[1]);
        const maxScoresRow = parseCSVLine(lines[2]);
        const assignmentHeaders = headers.slice(4);
        
        const newAssignments = assignmentHeaders.filter(
          header => header && !categorizedAssignments[header]
        );

        if (newAssignments.length > 0) {
          const newCategorization = {};
          newAssignments.forEach(assignment => {
            newCategorization[assignment] = categorizeAssignment(assignment);
          });

          setPendingAssignments(
            newAssignments.map(name => ({
              name,
              suggestedCategory: newCategorization[name]
            }))
          );
          setShowCategorization(true);
          
          // Don't process student data yet - wait for categorization confirmation
          return;
        }

        // Process student data
        const studentData = {};
        for (let i = 5; i < lines.length; i++) {
          const values = parseCSVLine(lines[i]);
          const studentName = values[0];
          
          if (!studentName) continue;
          
          if (!studentData[studentName]) {
            studentData[studentName] = {
              name: studentName,
              assignments: {
                testsQuizzes: [],
                homework: [],
                classworkProjects: [],
                primarySources: [],
                ungraded: []
              }
            };
          }

          for (let j = 4; j < headers.length; j++) {
            const assignmentName = headers[j];
            const scoreValue = values[j];
            const maxScoreValue = maxScoresRow[j];
            
            if (!assignmentName) continue;
            if (!scoreValue || scoreValue === '') continue;
            
            const score = parseFloat(scoreValue);
            const maxScore = parseFloat(maxScoreValue);
            
            // Use saved categorization, fall back to auto-categorization only if not saved
            const category = categorizedAssignments[assignmentName] || categorizeAssignment(assignmentName);
            
            if (category === 'ungraded' || !maxScore || maxScore === 0 || isNaN(maxScore)) {
              studentData[studentName].assignments.ungraded.push({
                name: assignmentName,
                score: scoreValue,
                maxScore: maxScore || 0,
                category: 'ungraded'
              });
              continue;
            }
            
            if (!isNaN(score) && category !== 'uncategorized') {
              studentData[studentName].assignments[category].push({
                name: assignmentName,
                score: score,
                maxScore: maxScore
              });
            }
          }
        }

        setStudents(Object.values(studentData));
      };

      const confirmCategorization = () => {
        const newCategorization = { ...categorizedAssignments };
        pendingAssignments.forEach(assignment => {
          newCategorization[assignment.name] = assignment.suggestedCategory;
        });
        setCategorizedAssignments(newCategorization);
        setShowCategorization(false);
        setPendingAssignments([]);
        
        // Re-parse the CSV with the newly confirmed categorizations
        const fileInput = document.querySelector('input[type="file"]');
        if (fileInput && fileInput.files[0]) {
          const reader = new FileReader();
          reader.onload = (e) => {
            const text = e.target.result;
            // Now parse with updated categorizations
            const lines = text.split('\n').filter(line => line.trim());
            if (lines.length < 6) return;

            const headers = parseCSVLine(lines[1]);
            const maxScoresRow = parseCSVLine(lines[2]);

            const studentData = {};
            for (let i = 5; i < lines.length; i++) {
              const values = parseCSVLine(lines[i]);
              const studentName = values[0];
              
              if (!studentName) continue;
              
              if (!studentData[studentName]) {
                studentData[studentName] = {
                  name: studentName,
                  assignments: {
                    testsQuizzes: [],
                    homework: [],
                    classworkProjects: [],
                    primarySources: [],
                    ungraded: []
                  }
                };
              }

              for (let j = 4; j < headers.length; j++) {
                const assignmentName = headers[j];
                const scoreValue = values[j];
                const maxScoreValue = maxScoresRow[j];
                
                if (!assignmentName) continue;
                if (!scoreValue || scoreValue === '') continue;
                
                const score = parseFloat(scoreValue);
                const maxScore = parseFloat(maxScoreValue);
                
                const category = newCategorization[assignmentName] || categorizeAssignment(assignmentName);
                
                if (category === 'ungraded' || !maxScore || maxScore === 0 || isNaN(maxScore)) {
                  studentData[studentName].assignments.ungraded.push({
                    name: assignmentName,
                    score: scoreValue,
                    maxScore: maxScore || 0,
                    category: 'ungraded'
                  });
                  continue;
                }
                
                if (!isNaN(score) && category !== 'uncategorized') {
                  studentData[studentName].assignments[category].push({
                    name: assignmentName,
                    score: score,
                    maxScore: maxScore
                  });
                }
              }
            }

            setStudents(Object.values(studentData));
          };
          reader.readAsText(fileInput.files[0]);
        }
      };

      const updateAssignmentCategory = (assignmentName, newCategory) => {
        setPendingAssignments(prev =>
          prev.map(a =>
            a.name === assignmentName ? { ...a, suggestedCategory: newCategory } : a
          )
        );
      };

      const calculateAverage = (assignments) => {
        if (assignments.length === 0) return 0;
        const sum = assignments.reduce((acc, a) => acc + (a.score / a.maxScore * 100), 0);
        return sum / assignments.length;
      };

      const calculateWeightedGrade = (student) => {
        const testQuizAvg = calculateAverage(student.assignments.testsQuizzes);
        const hwAvg = calculateAverage(student.assignments.homework);
        const classworkProjAvg = calculateAverage(student.assignments.classworkProjects);
        const primarySourceAvg = calculateAverage(student.assignments.primarySources);

        return (testQuizAvg * weights.testsQuizzes / 100) + 
               (hwAvg * weights.homework / 100) + 
               (classworkProjAvg * weights.classworkProjects / 100) + 
               (primarySourceAvg * weights.primarySources / 100);
      };

      const exportToCSV = () => {
        let csv = 'Student Name,Tests/Quizzes Average,Homework Average,Classwork/Projects Average,Primary Sources Average,Weighted Grade\n';
        
        students.forEach(student => {
          const testQuizAvg = calculateAverage(student.assignments.testsQuizzes).toFixed(1);
          const hwAvg = calculateAverage(student.assignments.homework).toFixed(1);
          const classworkProjAvg = calculateAverage(student.assignments.classworkProjects).toFixed(1);
          const primarySourceAvg = calculateAverage(student.assignments.primarySources).toFixed(1);
          const weighted = calculateWeightedGrade(student).toFixed(1);
          
          csv += `${student.name},${testQuizAvg},${hwAvg},${classworkProjAvg},${primarySourceAvg},${weighted}\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'student_grade_breakdown.csv';
        a.click();
      };

      const addSampleData = () => {
        setCategorizedAssignments({
          'Chapter 1 Test': 'testsQuizzes',
          'WWI Quiz': 'testsQuizzes',
          'Midterm Exam': 'testsQuizzes',
          'Chapter 2 Book Notes': 'homework',
          'HW: Pages 45-50': 'homework',
          'Constitution DBQ': 'primarySources',
          'PS: Declaration Analysis': 'primarySources',
          'Civil War Video Notes': 'classworkProjects',
          'Group Project: Timeline': 'classworkProjects',
          'Class Discussion': 'ungraded'
        });

        setStudents([
          {
            name: 'Alice Johnson',
            assignments: {
              testsQuizzes: [
                { name: 'Chapter 1 Test', score: 85, maxScore: 100 },
                { name: 'WWI Quiz', score: 46, maxScore: 50 },
                { name: 'Midterm Exam', score: 176, maxScore: 200 }
              ],
              homework: [
                { name: 'Chapter 2 Book Notes', score: 9.5, maxScore: 10 },
                { name: 'HW: Pages 45-50', score: 20, maxScore: 20 }
              ],
              classworkProjects: [
                { name: 'Civil War Video Notes', score: 18, maxScore: 20 },
                { name: 'Group Project: Timeline', score: 92, maxScore: 100 }
              ],
              primarySources: [
                { name: 'Constitution DBQ', score: 44, maxScore: 50 },
                { name: 'PS: Declaration Analysis', score: 19, maxScore: 20 }
              ],
              ungraded: [
                { name: 'Class Discussion', score: 'Complete', maxScore: 0, category: 'ungraded' }
              ]
            }
          },
          {
            name: 'Bob Smith',
            assignments: {
              testsQuizzes: [
                { name: 'Chapter 1 Test', score: 72, maxScore: 100 },
                { name: 'WWI Quiz', score: 34, maxScore: 50 },
                { name: 'Midterm Exam', score: 140, maxScore: 200 }
              ],
              homework: [
                { name: 'Chapter 2 Book Notes', score: 0, maxScore: 10 },
                { name: 'HW: Pages 45-50', score: 15, maxScore: 20 }
              ],
              classworkProjects: [
                { name: 'Civil War Video Notes', score: 17, maxScore: 20 },
                { name: 'Group Project: Timeline', score: 3, maxScore: 100 }
              ],
              primarySources: [
                { name: 'Constitution DBQ', score: 40, maxScore: 50 },
                { name: 'PS: Declaration Analysis', score: 17, maxScore: 20 }
              ],
              ungraded: [
                { name: 'Class Discussion', score: 'Incomplete', maxScore: 0, category: 'ungraded' }
              ]
            }
          }
        ]);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
          <div className="max-w-7xl mx-auto">
            <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
              <h1 className="text-3xl font-bold text-gray-800 mb-2">Weighted Grade Calculator</h1>
              <p className="text-gray-600 mb-4">Upload your Google Classroom grades export to see category breakdowns</p>

              {/* Class Selection */}
              <div className="mb-6 bg-gray-50 rounded-lg p-4 border border-gray-200">
                <div className="flex items-center gap-3 mb-3">
                  <label className="text-sm font-medium text-gray-700">Current Class:</label>
                  {classes.length > 0 ? (
                    <div className="flex items-center gap-2 flex-1">
                      <select
                        value={currentClass || ''}
                        onChange={(e) => setCurrentClass(e.target.value)}
                        className="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      >
                        {classes.map(cls => (
                          <option key={cls.id} value={cls.id}>{cls.name}</option>
                        ))}
                      </select>
                      <button
                        onClick={() => setShowAddClass(true)}
                        className="px-3 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors"
                      >
                        + Add Class
                      </button>
                      {classes.length > 1 && (
                        <button
                          onClick={() => deleteClass(currentClass)}
                          className="px-3 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition-colors"
                        >
                          Delete
                        </button>
                      )}
                    </div>
                  ) : (
                    <button
                      onClick={() => setShowAddClass(true)}
                      className="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors"
                    >
                      Create Your First Class
                    </button>
                  )}
                </div>
                
                {showAddClass && (
                  <div className="flex items-center gap-2 mt-3 pt-3 border-t border-gray-300">
                    <input
                      type="text"
                      value={newClassName}
                      onChange={(e) => setNewClassName(e.target.value)}
                      onKeyPress={(e) => e.key === 'Enter' && addNewClass()}
                      placeholder="Enter class name (e.g., Period 1 World History)"
                      className="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      autoFocus
                    />
                    <button
                      onClick={addNewClass}
                      className="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition-colors"
                    >
                      Add
                    </button>
                    <button
                      onClick={() => {
                        setShowAddClass(false);
                        setNewClassName('');
                      }}
                      className="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400 transition-colors"
                    >
                      Cancel
                    </button>
                  </div>
                )}
              </div>

              {!currentClass && classes.length === 0 && (
                <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-6">
                  <p className="text-sm text-yellow-900">
                    👋 Welcome! Click "Create Your First Class" above to get started.
                  </p>
                </div>
              )}

              {currentClass && (
                <div>
                  <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                    <div className="flex items-start">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-blue-600 mr-3 mt-0.5 flex-shrink-0">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                      </svg>
                      <div className="text-sm text-blue-900">
                        <p className="font-semibold mb-1">How to use:</p>
                        <ol className="list-decimal ml-4 space-y-1">
                          <li>In Google Classroom, go to Grades → Settings (gear icon) → "Copy all grades to Google Sheets"</li>
                          <li>In the spreadsheet, go to File → Download → CSV</li>
                          <li>Upload the CSV here - you'll be asked to confirm assignment categories</li>
                          <li>The tool remembers categorized assignments for future uploads</li>
                          <li>View detailed breakdowns and export results</li>
                        </ol>
                        <p className="mt-3 text-xs text-blue-800">Expected CSV format: Row 1 = dates, Row 2 = assignment names (starting column E), Row 3 = max points, Row 4 = blank, Row 5 = class averages, Row 6+ = students</p>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-2">
                        Upload CSV from Google Sheets
                      </label>
                      <input
                        type="file"
                        accept=".csv"
                        onChange={handleFileUpload}
                        className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                      />
                    </div>
                    <div className="flex items-end">
                      <button
                        onClick={addSampleData}
                        className="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors"
                      >
                        Load Sample Data
                      </button>
                    </div>
                  </div>

                  <div className="mb-6">
                    <h2 className="text-lg font-semibold text-gray-800 mb-3">Category Weights</h2>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Tests & Quizzes (%)</label>
                        <input
                          type="number"
                          value={weights.testsQuizzes}
                          onChange={(e) => setWeights({...weights, testsQuizzes: parseInt(e.target.value) || 0})}
                          className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Homework (%)</label>
                        <input
                          type="number"
                          value={weights.homework}
                          onChange={(e) => setWeights({...weights, homework: parseInt(e.target.value) || 0})}
                          className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Classwork & Projects (%)</label>
                        <input
                          type="number"
                          value={weights.classworkProjects}
                          onChange={(e) => setWeights({...weights, classworkProjects: parseInt(e.target.value) || 0})}
                          className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Primary Sources (%)</label>
                        <input
                          type="number"
                          value={weights.primarySources}
                          onChange={(e) => setWeights({...weights, primarySources: parseInt(e.target.value) || 0})}
                          className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                      </div>
                    </div>
                    {weights.testsQuizzes + weights.homework + weights.classworkProjects + weights.primarySources !== 100 && (
                      <p className="text-red-600 text-sm mt-2">⚠️ Weights should add up to 100%</p>
                    )}
                  </div>

                  {students.length > 0 && (
                    <button
                      onClick={exportToCSV}
                      className="mb-4 px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition-colors"
                    >
                      Export Summary to CSV
                    </button>
                  )}
                </div>
              )}
            </div>

            {/* Categorization Modal */}
            {showCategorization && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                <div className="bg-white rounded-lg shadow-xl max-w-4xl w-full max-h-[90vh] overflow-hidden flex flex-col">
                  <div className="p-6 border-b">
                    <h2 className="text-2xl font-bold text-gray-800">Confirm Assignment Categories</h2>
                    <p className="text-gray-600 mt-1">Review and adjust the suggested categories for new assignments</p>
                  </div>
                  
                  <div className="p-6 overflow-y-auto flex-1">
                    <div className="space-y-3">
                      {pendingAssignments.map((assignment, idx) => (
                        <div key={idx} className="border rounded-lg p-4 bg-gray-50">
                          <div className="flex items-center justify-between">
                            <span className="font-medium text-gray-800">{assignment.name}</span>
                            <select
                              value={assignment.suggestedCategory}
                              onChange={(e) => updateAssignmentCategory(assignment.name, e.target.value)}
                              className="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                              <option value="testsQuizzes">Tests & Quizzes</option>
                              <option value="homework">Homework</option>
                              <option value="classworkProjects">Classwork & Projects</option>
                              <option value="primarySources">Primary Sources</option>
                              <option value="ungraded">Ungraded</option>
                            </select>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="p-6 border-t flex justify-end gap-3">
                    <button
                      onClick={() => setShowCategorization(false)}
                      className="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors"
                    >
                      Cancel
                    </button>
                    <button
                      onClick={confirmCategorization}
                      className="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors"
                    >
                      Confirm Categories
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Student Detail Modal */}
            {selectedStudent && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                <div className="bg-white rounded-lg shadow-xl max-w-5xl w-full max-h-[90vh] overflow-hidden flex flex-col">
                  <div className="p-6 border-b flex justify-between items-center">
                    <div>
                      <h2 className="text-2xl font-bold text-gray-800">{selectedStudent.name}</h2>
                      <p className="text-gray-600">Detailed Assignment Breakdown</p>
                    </div>
                    <button
                      onClick={() => setSelectedStudent(null)}
                      className="text-gray-500 hover:text-gray-700 text-2xl"
                    >
                      ×
                    </button>
                  </div>
                  
                  <div className="p-6 overflow-y-auto flex-1">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div>
                        <h3 className="text-lg font-semibold text-purple-900 mb-3">Tests & Quizzes ({weights.testsQuizzes}%)</h3>
                        <div className="space-y-2">
                          {selectedStudent.assignments.testsQuizzes.map((assignment, idx) => (
                            <div key={idx} className="bg-purple-50 rounded p-3">
                              <div className="flex justify-between items-start">
                                <span className="text-sm font-medium text-gray-800">{assignment.name}</span>
                                <span className={`text-sm font-bold ${assignment.score === 0 ? 'text-red-600' : assignment.score < assignment.maxScore * 0.6 ? 'text-orange-600' : 'text-purple-700'}`}>
                                  {assignment.score}/{assignment.maxScore}
                                </span>
                              </div>
                              <div className="text-xs text-purple-600 mt-1">
                                {((assignment.score / assignment.maxScore) * 100).toFixed(1)}%
                              </div>
                            </div>
                          ))}
                          {selectedStudent.assignments.testsQuizzes.length === 0 && (
                            <p className="text-sm text-gray-500 italic">No assignments yet</p>
                          )}
                        </div>
                      </div>

                      <div>
                        <h3 className="text-lg font-semibold text-green-900 mb-3">Homework ({weights.homework}%)</h3>
                        <div className="space-y-2">
                          {selectedStudent.assignments.homework.map((assignment, idx) => (
                            <div key={idx} className="bg-green-50 rounded p-3">
                              <div className="flex justify-between items-start">
                                <span className="text-sm font-medium text-gray-800">{assignment.name}</span>
                                <span className={`text-sm font-bold ${assignment.score === 0 ? 'text-red-600' : assignment.score < assignment.maxScore * 0.6 ? 'text-orange-600' : 'text-green-700'}`}>
                                  {assignment.score}/{assignment.maxScore}
                                </span>
                              </div>
                              <div className="text-xs text-green-600 mt-1">
                                {((assignment.score / assignment.maxScore) * 100).toFixed(1)}%
                              </div>
                            </div>
                          ))}
                          {selectedStudent.assignments.homework.length === 0 && (
                            <p className="text-sm text-gray-500 italic">No assignments yet</p>
                          )}
                        </div>
                      </div>

                      <div>
                        <h3 className="text-lg font-semibold text-orange-900 mb-3">Classwork & Projects ({weights.classworkProjects}%)</h3>
                        <div className="space-y-2">
                          {selectedStudent.assignments.classworkProjects.map((assignment, idx) => (
                            <div key={idx} className="bg-orange-50 rounded p-3">
                              <div className="flex justify-between items-start">
                                <span className="text-sm font-medium text-gray-800">{assignment.name}</span>
                                <span className={`text-sm font-bold ${assignment.score === 0 ? 'text-red-600' : assignment.score < assignment.maxScore * 0.6 ? 'text-orange-600' : 'text-orange-700'}`}>
                                  {assignment.score}/{assignment.maxScore}
                                </span>
                              </div>
                              <div className="text-xs text-orange-600 mt-1">
                                {((assignment.score / assignment.maxScore) * 100).toFixed(1)}%
                              </div>
                            </div>
                          ))}
                          {selectedStudent.assignments.classworkProjects.length === 0 && (
                            <p className="text-sm text-gray-500 italic">No assignments yet</p>
                          )}
                        </div>
                      </div>

                      <div>
                        <h3 className="text-lg font-semibold text-blue-900 mb-3">Primary Sources ({weights.primarySources}%)</h3>
                        <div className="space-y-2">
                          {selectedStudent.assignments.primarySources.map((assignment, idx) => (
                            <div key={idx} className="bg-blue-50 rounded p-3">
                              <div className="flex justify-between items-start">
                                <span className="text-sm font-medium text-gray-800">{assignment.name}</span>
                                <span className={`text-sm font-bold ${assignment.score === 0 ? 'text-red-600' : assignment.score < assignment.maxScore * 0.6 ? 'text-orange-600' : 'text-blue-700'}`}>
                                  {assignment.score}/{assignment.maxScore}
                                </span>
                              </div>
                              <div className="text-xs text-blue-600 mt-1">
                                {((assignment.score / assignment.maxScore) * 100).toFixed(1)}%
                              </div>
                            </div>
                          ))}
                          {selectedStudent.assignments.primarySources.length === 0 && (
                            <p className="text-sm text-gray-500 italic">No assignments yet</p>
                          )}
                        </div>
                      </div>
                    </div>

                    {selectedStudent.assignments.ungraded.length > 0 && (
                      <div className="mt-6 border-t pt-6">
                        <h3 className="text-lg font-semibold text-gray-700 mb-3">Ungraded Assignments</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                          {selectedStudent.assignments.ungraded.map((assignment, idx) => (
                            <div key={idx} className="bg-gray-50 rounded p-3">
                              <div className="flex justify-between items-start">
                                <span className="text-sm font-medium text-gray-800">{assignment.name}</span>
                                <span className="text-sm text-gray-600">{assignment.score}</span>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {students.length > 0 && (
              <div className="space-y-4">
                {students.map((student, idx) => {
                  const testQuizAvg = calculateAverage(student.assignments.testsQuizzes);
                  const hwAvg = calculateAverage(student.assignments.homework);
                  const classworkProjAvg = calculateAverage(student.assignments.classworkProjects);
                  const primarySourceAvg = calculateAverage(student.assignments.primarySources);
                  const weighted = calculateWeightedGrade(student);

                  return (
                    <div key={idx} className="bg-white rounded-lg shadow-lg p-6">
                      <div className="flex justify-between items-start mb-4">
                        <h3 className="text-xl font-bold text-gray-800">{student.name}</h3>
                        <div className="flex items-center gap-3">
                          <div className="text-right">
                            <p className="text-sm text-gray-600">Weighted Grade</p>
                            <p className="text-3xl font-bold text-blue-600">{weighted.toFixed(1)}%</p>
                          </div>
                          <button
                            onClick={() => setSelectedStudent(student)}
                            className="px-3 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors text-sm"
                          >
                            Details
                          </button>
                        </div>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-purple-50 rounded-lg p-4">
                          <h4 className="font-semibold text-purple-900 mb-2">Tests & Quizzes ({weights.testsQuizzes}%)</h4>
                          <p className="text-2xl font-bold text-purple-700">{testQuizAvg.toFixed(1)}%</p>
                          <p className="text-sm text-purple-600 mt-1">{student.assignments.testsQuizzes.length} assessment(s)</p>
                        </div>

                        <div className="bg-green-50 rounded-lg p-4">
                          <h4 className="font-semibold text-green-900 mb-2">Homework ({weights.homework}%)</h4>
                          <p className="text-2xl font-bold text-green-700">{hwAvg.toFixed(1)}%</p>
                          <p className="text-sm text-green-600 mt-1">{student.assignments.homework.length} assignment(s)</p>
                        </div>

                        <div className="bg-orange-50 rounded-lg p-4">
                          <h4 className="font-semibold text-orange-900 mb-2">Classwork & Projects ({weights.classworkProjects}%)</h4>
                          <p className="text-2xl font-bold text-orange-700">{classworkProjAvg.toFixed(1)}%</p>
                          <p className="text-sm text-orange-600 mt-1">{student.assignments.classworkProjects.length} item(s)</p>
                        </div>

                        <div className="bg-blue-50 rounded-lg p-4">
                          <h4 className="font-semibold text-blue-900 mb-2">Primary Sources ({weights.primarySources}%)</h4>
                          <p className="text-2xl font-bold text-blue-700">{primarySourceAvg.toFixed(1)}%</p>
                          <p className="text-sm text-blue-600 mt-1">{student.assignments.primarySources.length} source(s)</p>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {students.length === 0 && currentClass && (
              <div className="bg-white rounded-lg shadow-lg p-12 text-center">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mx-auto text-gray-400 mb-4">
                  <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                  <line x1="8" y1="6" x2="16" y2="6"></line>
                  <line x1="8" y1="10" x2="16" y2="10"></line>
                  <line x1="8" y1="14" x2="16" y2="14"></line>
                  <line x1="8" y1="18" x2="16" y2="18"></line>
                </svg>
                <h3 className="text-xl font-semibold text-gray-700 mb-2">No Data Yet</h3>
                <p className="text-gray-600">Upload a CSV file for {getCurrentClassName()} or load sample data to get started</p>
              </div>
            )}
          </div>
        </div>
      );
    };

    ReactDOM.render(<WeightedGradeCalculator />, document.getElementById('root'));
  </script>
</body>
</html>
